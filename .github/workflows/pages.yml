name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update publications from ORCID
        env:
          ORCID_ID: "0000-0003-4970-2065"
          ORCID_MIN_WORKS: "5"
        run: |
          set -euo pipefail
          python3 scripts/update_orcid.py

      - name: Commit ORCID publications update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiorna pubblicazioni da ORCID"
          file_pattern: "data/publications.json data/publications.meta.json"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
